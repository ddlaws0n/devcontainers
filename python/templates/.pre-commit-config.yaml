# Example pre-commit config for projects using devcontainer-python.
# Install hooks:  pre-commit install
# Run manually:   pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.14
    hooks:
      - id: uv-lock        # keep uv.lock in sync with pyproject.toml
      - id: uv-export      # emit requirements.txt for tooling that needs it

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
